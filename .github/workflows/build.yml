name: Build desktop apps

# Two ways in:
#   • Manual:  Actions → "Build desktop apps" → Run workflow (artifacts only).
#   • Release: publishing a GitHub Release builds Mac + Windows and attaches
#              the installers to that release.
on:
  workflow_dispatch:
  release:
    types: [published]

# Needed so the release event can upload installers back onto the release.
permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.platform }} installer
        run: npm run build:${{ matrix.platform }}

      # Always available to download from the run itself.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runico-${{ matrix.platform }}
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip
            dist-electron/*.exe
          if-no-files-found: ignore
          retention-days: 14

      # On a published release, attach the installers to that release.
      - name: Attach installers to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-electron/*.dmg
            dist-electron/*.zip
            dist-electron/*.exe
          fail_on_unmatched_files: false
